<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f8;
        }

        /* NAVBAR (TOP LEFT LOGO) */
        .navbar {
            background-color: #2f3e4e;
            color: white;
            padding: 10px 20px;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar img {
            width: 50px;
            height: 50px;
        }

        .title {
            font-size: 15px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 12px;
            opacity: 0.8;
        }

        /* LOGIN BOX */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            padding: 10px;
            width: 250px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- TOP LEFT HEADER -->
<div class="navbar">
    <div class="navbar-left">
        <img src="logo.png">
        <div>
            <div class="title">INDIAN INSTITUTE OF TECHNOLOGY MADRAS</div>
            <div class="subtitle">Score Portal</div>
        </div>
    </div>
</div>

<!-- LOGIN BOX -->
<div class="container">
    <div class="box">
        <h2>Login</h2>

        <input type="email" id="email" placeholder="Enter your email"><br>

        <button onclick="login()">Login</button>
    </div>
</div>

<script>
function login() {
    let email = document.getElementById("email").value;

    if (!email) {
        alert("Enter email");
        return;
    }

    localStorage.setItem("email", email);
    window.location.href = "/";
}
</script>

</body>
</html>
